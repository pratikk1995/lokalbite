name: localbite_customer
description: LocalBite Customer App - Order food & kirana from local shops
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_messaging: ^14.7.9
  geolocator: ^11.0.0
  google_maps_flutter: ^2.7.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  provider: ^6.1.1
  http: ^1.1.2
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.0
  url_launcher: ^6.2.2
  razorpay_flutter: ^1.3.7
  instamojo: ^1.0.0
  qr_code_scanner_plus: ^1.0.0
  uuid: ^4.2.1
  timeago: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
